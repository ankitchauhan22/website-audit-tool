name: PR Release Comment

on:
  pull_request_target:
    types:
      - closed

permissions:
  pull-requests: write

jobs:
  comment-on-main-merge:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Add release note comment to merged PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changedTitle = pr.title || "Merged change";
            const body = [
              "Release readiness update",
              `This website audit tool change has been merged into \`main\` and is ready for the next deployment review.`,
              `Merged PR: **${changedTitle}**`,
              `Merge commit: \`${pr.merge_commit_sha || "not available"}\``,
              "Recommended post-merge checks:",
              "- Confirm the Vercel deployment completes successfully.",
              "- Run a live scan against at least one known WordPress site and one non-WordPress site.",
              "- Verify PDF export still renders correctly after deployment.",
              "- Spot-check CMS detection, version guidance, recommendations, and score breakdown output.",
            ].join("\n\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
